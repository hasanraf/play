<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamFlix IPTV</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b0b0f;
    color:#fff;
    min-height:100vh;
}

/* Hero */
.hero{
    height:55vh;
    background:
    linear-gradient(to top,#0b0b0f 10%,transparent 60%),
    url('https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=1600') center/cover;
    display:flex;
    align-items:flex-end;
    padding:40px;
}

.hero-content h1{
    font-size:3rem;
    font-weight:700;
    color:#e50914;
}

.hero-content p{
    max-width:600px;
    margin-top:10px;
    opacity:.8;
}

/* Header */
header{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.5);
    padding:15px 25px;
}

.logo{
    color:#e50914;
    font-size:28px;
    font-weight:700;
}

/* Sections */
.section{
    padding:30px;
}

.section-title{
    font-size:1.4rem;
    margin-bottom:20px;
    font-weight:600;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:linear-gradient(145deg,#1a1a22,#0f0f14);
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    transition:.35s;
    border:1px solid rgba(255,255,255,.05);
}

.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 15px 35px rgba(229,9,20,.25);
}

.card-banner{
    height:120px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    background:linear-gradient(135deg,#e50914,#ff4d4d);
}

.card-body{
    padding:15px;
}

.card-body h3{
    font-size:18px;
}

.card-body p{
    opacity:.7;
    font-size:13px;
    margin-top:6px;
}

/* Player Modal */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-content{
    width:95%;
    max-width:900px;
    background:#111;
    border-radius:20px;
    overflow:hidden;
}

.modal-header{
    padding:15px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #222;
}

.close-btn{
    background:#e50914;
    border:none;
    color:white;
    width:40px;
    height:40px;
    border-radius:50%;
    cursor:pointer;
    font-size:18px;
}

iframe{
    width:100%;
    height:70vh;
    border:none;
}

@media(max-width:768px){

.hero{
    height:40vh;
    padding:20px;
}

.hero-content h1{
    font-size:2rem;
}

.cards{
    grid-template-columns:repeat(2,1fr);
}

.card-banner{
    height:90px;
    font-size:32px;
}

iframe{
    height:60vh;
}
}
</style>
</head>
<body>

<header>
    <div class="logo">STREAMFLIX</div>
</header>

<div class="hero">
    <div class="hero-content">
        <h1>Unlimited IPTV Streaming</h1>
        <p>Watch Live TV, Sports, Movies, Music, Kids & Entertainment Channels.</p>
    </div>
</div>

<section class="section">
    <h2 class="section-title">Browse Categories</h2>

    <div class="cards" id="playlistGrid"></div>
</section>

<div class="modal" id="playerModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="playlistTitle">Playlist</h3>
            <button class="close-btn" onclick="closeModal()">✕</button>
        </div>

        <iframe id="playlistFrame"></iframe>
    </div>
</div>

<script>

const playlists = [
{
    name:'BDTV',
    icon:'📺',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u.txt'
},
{
    name:'Sports',
    icon:'⚽',
    url:'https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u'
},
{
    name:'Entertainment',
    icon:'🎭',
    url:'https://raw.githubusercontent.com/hasanraf/entertainment/refs/heads/main/entertainment.m3u'
},
{
    name:'Movies',
    icon:'🎬',
    url:'https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u'
},
{
    name:'Music',
    icon:'🎵',
    url:'https://raw.githubusercontent.com/hasanraf/musicandother/refs/heads/main/musicandother.m3u'
},
{
    name:'News',
    icon:'📰',
    url:'https://raw.githubusercontent.com/hasanraf/News/refs/heads/main/news.m3u'
},
{
    name:'Kids',
    icon:'🧸',
    url:'https://raw.githubusercontent.com/hasanraf/Kids/refs/heads/main/kids.m3u'
}
];

const grid = document.getElementById("playlistGrid");

playlists.forEach(item => {

    grid.innerHTML += `
        <div class="card" onclick="openPlaylist('${item.name}','${item.url}')">
            <div class="card-banner">${item.icon}</div>
            <div class="card-body">
                <h3>${item.name}</h3>
                <p>Open Playlist</p>
            </div>
        </div>
    `;
});

function openPlaylist(title,url){

    document.getElementById("playlistTitle").innerText = title;

    document.getElementById("playlistFrame").src =
    "https://m3u-editor.com/iptv-player/?url=" + encodeURIComponent(url);

    document.getElementById("playerModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("playerModal").style.display = "none";
    document.getElementById("playlistFrame").src = "";
}

</script>

</body>
</html>
