<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
}

.header{
padding:20px;
font-size:24px;
font-weight:700;
text-align:center;
background:#111827;
position:sticky;
top:0;
z-index:100;
}

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:14px 16px;
border:none;
border-radius:14px;
background:#1e293b;
color:white;
font-size:15px;
}

.tabs{
display:flex;
gap:10px;
padding:0 15px 15px;
overflow:auto;
}

.tab{
padding:10px 18px;
background:#1e293b;
border-radius:999px;
cursor:pointer;
white-space:nowrap;
font-size:14px;
}

.tab.active{
background:#2563eb;
}

.grid{
padding:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
gap:15px;
}

.card{
background:#1e293b;
border-radius:18px;
overflow:hidden;
cursor:pointer;
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-4px);
}

.thumb{
height:110px;
width:100%;
object-fit:cover;
}

.live{
position:absolute;
top:10px;
right:10px;
background:red;
padding:4px 10px;
border-radius:20px;
font-size:11px;
font-weight:bold;
}

.info{
padding:12px;
}

.name{
font-size:15px;
font-weight:600;
}

.category{
font-size:12px;
opacity:.7;
margin-top:4px;
}

/* Player */

.player{
position:fixed;
inset:0;
background:black;
display:none;
z-index:99999;
}

.player video{
width:100%;
height:100%;
object-fit:contain;
background:black;
}

.close{
position:absolute;
top:20px;
right:20px;
width:45px;
height:45px;
border:none;
border-radius:50%;
background:#ef4444;
color:white;
font-size:20px;
cursor:pointer;
z-index:100000;
}

</style>
</head>
<body>

<div class="header">📺 Live TV</div>

<div class="search-box">
<input
type="text"
id="search"
placeholder="Search channels..."
onkeyup="searchChannel()">
</div>

<div class="tabs">
<div class="tab active" onclick="filterCategory('All',this)">All</div>
<div class="tab" onclick="filterCategory('Sports',this)">Sports</div>
<div class="tab" onclick="filterCategory('News',this)">News</div>
<div class="tab" onclick="filterCategory('Movies',this)">Movies</div>
<div class="tab" onclick="filterCategory('Kids',this)">Kids</div>
</div>

<div class="grid" id="grid"></div>

<div class="player" id="player">

<button class="close" onclick="closePlayer()">
✕
</button>

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

<script>

const channels = [

{
name:"Sports TV",
category:"Sports",
image:"https://picsum.photos/400/220?1",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
},

{
name:"News Live",
category:"News",
image:"https://picsum.photos/400/220?2",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
},

{
name:"Movie Plus",
category:"Movies",
image:"https://picsum.photos/400/220?3",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
},

{
name:"Kids World",
category:"Kids",
image:"https://picsum.photos/400/220?4",
url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
}

];

let current = [...channels];

function render(data){

const grid = document.getElementById("grid");

grid.innerHTML="";

data.forEach(ch=>{

grid.innerHTML += `
<div class="card"
onclick="playChannel('${ch.url}')">

<div class="live">LIVE</div>

<img
class="thumb"
src="${ch.image}">

<div class="info">

<div class="name">
${ch.name}
</div>

<div class="category">
${ch.category}
</div>

</div>

</div>
`;

});

}

render(channels);

function searchChannel(){

const keyword =
document.getElementById("search")
.value.toLowerCase();

const filtered =
current.filter(item =>
item.name.toLowerCase().includes(keyword)
);

render(filtered);

}

function filterCategory(cat,el){

document
.querySelectorAll('.tab')
.forEach(tab=>tab.classList.remove('active'));

el.classList.add('active');

if(cat==="All"){

current=[...channels];

}else{

current=
channels.filter(c=>c.category===cat);

}

render(current);

}

function playChannel(url){

const player =
document.getElementById("player");

const video =
document.getElementById("video");

player.style.display="block";

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}else{

video.src=url;

}

video.play();

if(video.requestFullscreen){
video.requestFullscreen();
}

}

function closePlayer(){

document.getElementById("player")
.style.display="none";

const video =
document.getElementById("video");

video.pause();
video.src="";

}

</script>

</body>
</html>
