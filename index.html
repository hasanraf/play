<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPTV Stream Pro</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0b0f19;
color:white;
}

/* HEADER */
.header{
padding:18px;
font-size:22px;
font-weight:700;
background:rgba(0,0,0,.6);
backdrop-filter:blur(15px);
position:sticky;
top:0;
z-index:10;
}

/* CATEGORY */
.tabs{
display:flex;
overflow-x:auto;
gap:10px;
padding:12px;
}

.tab{
padding:10px 16px;
background:#1f2937;
border-radius:999px;
white-space:nowrap;
cursor:pointer;
font-size:14px;
}

.tab.active{
background:#e50914;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#111827;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.thumb{
width:100%;
height:110px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.name{
font-size:14px;
font-weight:600;
}

/* LIVE */
.live{
position:absolute;
top:8px;
right:8px;
background:red;
padding:4px 8px;
border-radius:12px;
font-size:10px;
}

/* PLAYER */
.player{
position:fixed;
inset:0;
background:black;
display:none;
z-index:99999;
}

.player video{
width:100%;
height:100%;
object-fit:contain;
}

.close{
position:absolute;
top:15px;
right:15px;
background:red;
border:none;
color:white;
width:45px;
height:45px;
border-radius:50%;
font-size:18px;
z-index:100000;
}

@media(min-width:768px){
.grid{
grid-template-columns:repeat(4,1fr);
}
}

</style>
</head>

<body>

<div class="header">📺 IPTV Stream Pro</div>

<!-- CATEGORY TABS -->
<div class="tabs" id="tabs"></div>

<!-- CHANNEL GRID -->
<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player" id="player">

<button class="close" onclick="closePlayer()">✕</button>

<video id="video" controls autoplay playsinline></video>

</div>

<script>

const playlists = [

{
name:'BDTV',
url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u.txt'
},

{
name:'Sports',
url:'https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u'
},

{
name:'Entertainment',
url:'https://raw.githubusercontent.com/hasanraf/entertainment/refs/heads/main/entertainment.m3u'
},

{
name:'Movies',
url:'https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u'
},

{
name:'Music',
url:'https://raw.githubusercontent.com/hasanraf/musicandother/refs/heads/main/musicandother.m3u'
},

{
name:'News',
url:'https://raw.githubusercontent.com/hasanraf/News/refs/heads/main/news.m3u'
},

{
name:'Kids',
url:'https://raw.githubusercontent.com/hasanraf/Kids/refs/heads/main/kids.m3u'
}

];

let currentChannels = [];

const tabs = document.getElementById("tabs");
const grid = document.getElementById("grid");

/* LOAD TABS */
playlists.forEach((p,i)=>{

const tab = document.createElement("div");
tab.className="tab";
tab.innerText=p.name;

if(i===0) tab.classList.add("active");

tab.onclick=()=>loadPlaylist(p.url, tab);

tabs.appendChild(tab);

});

/* LOAD M3U */
async function loadPlaylist(url, tab){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

tab.classList.add("active");

const res = await fetch(url);
const text = await res.text();

const lines = text.split("\n");

let channels=[];

for(let i=0;i<lines.length;i++){

if(lines[i].includes("#EXTINF")){

const name = lines[i].split(",")[1];

const stream = lines[i+1];

channels.push({
name,
url:stream,
thumb:"https://picsum.photos/300/200?"+i
});

}
}

currentChannels = channels;

render(channels);

}

/* RENDER */
function render(data){

grid.innerHTML="";

data.forEach(ch=>{

grid.innerHTML+=`
<div class="card" onclick="play('${ch.url}')">

<div class="live">LIVE</div>

<img class="thumb" src="${ch.thumb}">

<div class="card-body">
<div class="name">${ch.name}</div>
</div>

</div>
`;

});

}

/* PLAY */
let hls;

function play(url){

document.getElementById("player").style.display="block";

const video=document.getElementById("video");

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();
});

}else{

video.src=url;
video.play();

}

}

/* CLOSE */
function closePlayer(){

document.getElementById("player").style.display="none";

const video=document.getElementById("video");

video.pause();
video.src="";

if(hls) hls.destroy();

}

loadPlaylist(playlists[0].url, document.querySelector(".tab"));

</script>

</body>
</html>
