<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRO IPTV PLAYER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#020617;
    overflow:hidden;
    color:white;
}

/* MAIN */

.app{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:350px;
    background:rgba(15,23,42,.95);
    border-right:1px solid rgba(255,255,255,.08);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.logo{
    padding:20px;
    font-size:28px;
    font-weight:700;
    text-align:center;
    background:linear-gradient(90deg,#00d4ff,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SEARCH */

.search-box{
    padding:15px;
}

.search-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#0f172a;
    color:white;
    font-size:15px;
}

/* CATEGORY */

.categories{
    display:flex;
    gap:10px;
    padding:10px 15px;
    overflow-x:auto;
}

.categories button{
    padding:10px 18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:#0f172a;
    color:#94a3b8;
    transition:.3s;
    white-space:nowrap;
}

.categories button.active,
.categories button:hover{
    background:#06b6d4;
    color:white;
}

/* CHANNEL LIST */

.channel-list{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.channel{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px;
    margin-bottom:12px;
    border-radius:18px;
    background:rgba(255,255,255,.03);
    cursor:pointer;
    transition:.3s;
}

.channel:hover{
    background:#06b6d4;
    transform:translateX(5px);
}

.channel img{
    width:55px;
    height:55px;
    border-radius:14px;
    object-fit:cover;
    background:#111;
}

.channel-info{
    flex:1;
}

.channel-name{
    font-size:15px;
    font-weight:600;
}

.channel-category{
    font-size:12px;
    color:#cbd5e1;
}

/* PLAYER */

.player-container{
    flex:1;
    position:relative;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

/* OVERLAY */

.overlay{
    position:absolute;
    top:0;
    left:0;
    right:0;
    padding:20px;
    background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
    z-index:10;
}

.now-playing{
    font-size:28px;
    font-weight:700;
}

.live{
    display:inline-block;
    margin-top:10px;
    background:red;
    padding:6px 12px;
    border-radius:30px;
    font-size:12px;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{opacity:1}
    50%{opacity:.4}
    100%{opacity:1}
}

/* LOADER */

.loader{
    position:absolute;
    top:20px;
    right:20px;
    background:#06b6d4;
    color:black;
    padding:10px 18px;
    border-radius:12px;
    font-weight:700;
    z-index:99;
}

/* SCROLLBAR */

::-webkit-scrollbar{
    width:5px;
    height:5px;
}

::-webkit-scrollbar-thumb{
    background:#06b6d4;
    border-radius:10px;
}

/* MOBILE */

@media(max-width:900px){

    .sidebar{
        width:100%;
        height:45%;
        position:absolute;
        bottom:0;
        z-index:999;
    }

    .player-container{
        height:55%;
    }

    .app{
        flex-direction:column;
    }

}

</style>
</head>
<body>

<div class="app">

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">📺 PRO IPTV</div>

        <div class="search-box">
            <input type="text" id="search" placeholder="Search channels...">
        </div>

        <div class="categories" id="categories"></div>

        <div class="channel-list" id="channelList"></div>

    </div>

    <!-- PLAYER -->

    <div class="player-container">

        <div class="overlay">
            <div class="now-playing" id="nowPlaying">
                Select a Channel
            </div>

            <div class="live">● LIVE TV</div>
        </div>

        <div class="loader" id="loader">
            Loading Playlist...
        </div>

        <video id="video" controls autoplay></video>

    </div>

</div>

<script>

const playlists = [

{
    name:'BDTV',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u.txt'
},

{
    name:'Sports',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/sports.m3u'
},

{
    name:'Kids',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/kids.m3u'
},

{
    name:'Movies',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/movie.m3u'
},

{
    name:'Music',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/musicandother.m3u'
},

{
    name:'News',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/news.m3u'
},

{
    name:'Entertainment',
    url:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/entertainment.m3u'
}

];

const video = document.getElementById('video');
const channelList = document.getElementById('channelList');
const categories = document.getElementById('categories');
const search = document.getElementById('search');
const nowPlaying = document.getElementById('nowPlaying');
const loader = document.getElementById('loader');

let allChannels = [];
let currentCategory = 'All';

/* CREATE CATEGORY BUTTONS */

function createCategories(){

    const cats = ['All', ...playlists.map(p=>p.name)];

    cats.forEach(cat=>{

        const btn = document.createElement('button');

        btn.innerText = cat;

        if(cat==='All') btn.classList.add('active');

        btn.onclick = ()=>{

            document.querySelectorAll('.categories button')
            .forEach(b=>b.classList.remove('active'));

            btn.classList.add('active');

            currentCategory = cat;

            renderChannels();

        };

        categories.appendChild(btn);

    });

}

/* LOAD PLAYLISTS */

async function loadPlaylists(){

    for(const playlist of playlists){

        try{

            const res = await fetch(playlist.url);

            const text = await res.text();

            parseM3U(text, playlist.name);

        }catch(err){

            console.log(err);

        }

    }

    loader.style.display='none';

    renderChannels();

}

/* PARSE M3U */

function parseM3U(data, category){

    const lines = data.split('\n');

    for(let i=0;i<lines.length;i++){

        if(lines[i].startsWith('#EXTINF')){

            const info = lines[i];

            const stream = lines[i+1]?.trim();

            const nameMatch = info.match(/,(.*)/);

            const logoMatch = info.match(/tvg-logo="(.*?)"/);

            allChannels.push({

                name:nameMatch ? nameMatch[1] : 'Unknown',
                logo:logoMatch ? logoMatch[1] :
                'https://via.placeholder.com/80',
                url:stream,
                category:category

            });

        }

    }

}

/* RENDER CHANNELS */

function renderChannels(){

    const keyword = search.value.toLowerCase();

    channelList.innerHTML='';

    let filtered = allChannels.filter(ch=>{

        const matchCategory =
        currentCategory === 'All' ||
        ch.category === currentCategory;

        const matchSearch =
        ch.name.toLowerCase().includes(keyword);

        return matchCategory && matchSearch;

    });

    filtered.forEach(ch=>{

        const div = document.createElement('div');

        div.className='channel';

        div.innerHTML=`

            <img src="${ch.logo}"
            onerror="this.src='https://via.placeholder.com/80'">

            <div class="channel-info">

                <div class="channel-name">
                    ${ch.name}
                </div>

                <div class="channel-category">
                    ${ch.category}
                </div>

            </div>

        `;

        div.onclick=()=>playChannel(ch);

        channelList.appendChild(div);

    });

}

/* PLAY CHANNEL */

function playChannel(ch){

    video.src = ch.url;

    video.play();

    nowPlaying.innerText = ch.name;

}

/* SEARCH */

search.addEventListener('input',renderChannels);

createCategories();

loadPlaylists();

</script>

</body>
</html>
