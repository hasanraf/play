<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Free Online Tv</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter;
}

body{
background:#0b1220;
color:white;
}

/* HEADER */
.header{
padding:18px;
font-size:22px;
font-weight:700;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

/* TABS */
.tabs{
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;
}

.tab{
padding:10px 16px;
background:#1f2937;
border-radius:999px;
white-space:nowrap;
cursor:pointer;
font-size:14px;
}

.tab.active{
background:#e50914;
}

/* GRID */
.grid{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

/* CARD */
.card{
background:#111827;
border-radius:14px;
padding:12px;
cursor:pointer;
transition:.2s;
text-align:center;
}

.card:hover{
transform:scale(1.03);
background:#1f2937;
}

/* LOGO */
.logo{
width:70px;
height:70px;
object-fit:contain;
border-radius:12px;
background:#0f172a;
margin-bottom:10px;
}

/* NAME */
.name{
font-weight:600;
font-size:14px;
}

.group{
font-size:12px;
opacity:.7;
margin-top:4px;
}

/* LIVE */
.live{
background:red;
display:inline-block;
padding:3px 8px;
border-radius:10px;
font-size:10px;
margin-top:8px;
}

/* PLAYER */
.player{
position:fixed;
inset:0;
background:black;
display:none;
z-index:99999;
}

.player video{
width:100%;
height:100%;
object-fit:contain;
}

.close{
position:absolute;
top:15px;
right:15px;
width:45px;
height:45px;
border:none;
border-radius:50%;
background:red;
color:white;
font-size:18px;
cursor:pointer;
z-index:100000;
}

</style>
</head>
<body>

<div class="header">📺 Live Tv</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player" id="player">

<button class="close" onclick="closePlayer()">✕</button>

<video id="video" controls autoplay playsinline></video>

</div>

<script>

const playlists = [

{
name:"BDTV",
url:"https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u.txt"
},
{
name:"Sports",
url:"https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u"
},
{
name:"Entertainment",
url:"https://raw.githubusercontent.com/hasanraf/entertainment/refs/heads/main/entertainment.m3u"
},
{
name:"Movies",
url:"https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u"
},
{
name:"Music",
url:"https://raw.githubusercontent.com/hasanraf/musicandother/refs/heads/main/musicandother.m3u"
},
{
name:"News",
url:"https://raw.githubusercontent.com/hasanraf/News/refs/heads/main/news.m3u"
},
{
name:"Kids",
url:"https://raw.githubusercontent.com/hasanraf/Kids/refs/heads/main/kids.m3u"
}

];

let currentChannels=[];

/* TABS */
const tabs=document.getElementById("tabs");

playlists.forEach((p,i)=>{

const tab=document.createElement("div");
tab.className="tab";
tab.innerText=p.name;

if(i===0) tab.classList.add("active");

tab.onclick=()=>loadCategory(p.url, tab);

tabs.appendChild(tab);

});

/* LOAD M3U */
async function loadCategory(url, tab){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

tab.classList.add("active");

const res=await fetch(url);
const text=await res.text();

const lines=text.split("\n");

let channels=[];

for(let i=0;i<lines.length;i++){

if(lines[i].includes("#EXTINF")){

const info=lines[i];
const name=info.split(",")[1] || "Channel";

/* TVG LOGO EXTRACT */
let logoMatch = info.match(/tvg-logo="(.*?)"/);
let logo = logoMatch ? logoMatch[1] : "https://via.placeholder.com/70";

const stream=lines[i+1]?.trim();

if(stream){

channels.push({
name,
url:stream,
logo,
group:tab.innerText
});

}

}

}

currentChannels=channels;

render(channels);

}

/* RENDER */
function render(list){

const grid=document.getElementById("grid");

grid.innerHTML="";

list.forEach(ch=>{

grid.innerHTML+=`
<div class="card" onclick="play('${ch.url}')">

<img class="logo" src="${ch.logo}" onerror="this.src='https://via.placeholder.com/70'">

<div class="name">${ch.name}</div>

<div class="group">${ch.group}</div>

<div class="live">LIVE</div>

</div>
`;

});

}

/* PLAYER */
let hls;

function play(url){

document.getElementById("player").style.display="block";

const video=document.getElementById("video");

if(hls) hls.destroy();

if(Hls.isSupported()){

hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();
});

}else{

video.src=url;
video.play();

}

}

/* CLOSE */
function closePlayer(){

document.getElementById("player").style.display="none";

const video=document.getElementById("video");

video.pause();
video.src="";

if(hls) hls.destroy();

}

/* INIT */
loadCategory(playlists[0].url, document.querySelector(".tab"));

</script>

</body>
</html>
