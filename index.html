<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StreamFlix IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#0a0a0a;
    color:white;
}

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    background:rgba(0,0,0,.8);
    backdrop-filter:blur(20px);
    padding:15px 25px;
}

.logo{
    color:#e50914;
    font-size:30px;
    font-weight:700;
}

.hero{
    height:60vh;
    background:
    linear-gradient(to top,#0a0a0a,transparent),
    url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1600');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:flex-end;
    padding:40px;
}

.hero h1{
    font-size:3rem;
}

.container{
    padding:25px;
}

.search{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:12px;
    background:#181818;
    color:white;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:#181818;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.poster{
    height:220px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    background:linear-gradient(135deg,#e50914,#ff4d4d);
}

.info{
    padding:15px;
}

.info h3{
    font-size:18px;
}

/* FULLSCREEN PLAYER */

.player-overlay{
    position:fixed;
    inset:0;
    background:black;
    z-index:999999;
    display:none;
}

.player-overlay.active{
    display:block;
}

#video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:black;
}

.close-player{
    position:absolute;
    top:20px;
    right:20px;
    z-index:9999999;
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:#e50914;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.channel-list{
    position:absolute;
    left:0;
    top:0;
    width:320px;
    height:100%;
    overflow:auto;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(20px);
    padding:80px 15px 15px;
}

.channel{
    padding:12px;
    background:#181818;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.channel:hover{
    background:#e50914;
}

@media(max-width:768px){

.hero{
    height:40vh;
}

.hero h1{
    font-size:2rem;
}

.channel-list{
    width:240px;
}

}

</style>
</head>
<body>

<header>
    <div class="logo">STREAMFLIX</div>
</header>

<section class="hero">
    <h1>Unlimited IPTV Streaming</h1>
</section>

<div class="container">

<input
type="text"
class="search"
placeholder="Search Category...">

<div class="grid">

<div class="card" onclick="loadPlaylist('BDTV')">
    <div class="poster">📺</div>
    <div class="info">
        <h3>BDTV</h3>
    </div>
</div>

<div class="card" onclick="loadPlaylist('Sports')">
    <div class="poster">⚽</div>
    <div class="info">
        <h3>Sports</h3>
    </div>
</div>

<div class="card" onclick="loadPlaylist('Movies')">
    <div class="poster">🎬</div>
    <div class="info">
        <h3>Movies</h3>
    </div>
</div>

<div class="card" onclick="loadPlaylist('Entertainment')">
    <div class="poster">🎭</div>
    <div class="info">
        <h3>Entertainment</h3>
    </div>
</div>

<div class="card" onclick="loadPlaylist('Music')">
    <div class="poster">🎵</div>
    <div class="info">
        <h3>Music</h3>
    </div>
</div>

<div class="card" onclick="loadPlaylist('News')">
    <div class="poster">📰</div>
    <div class="info">
        <h3>News</h3>
    </div>
</div>

<div class="card" onclick="loadPlaylist('Kids')">
    <div class="poster">🧸</div>
    <div class="info">
        <h3>Kids</h3>
    </div>
</div>

</div>
</div>

<!-- FULL SCREEN PLAYER -->

<div class="player-overlay" id="playerOverlay">

<button class="close-player" onclick="closePlayer()">
✕
</button>

<div class="channel-list" id="channelList">
    <h3>Channels</h3>
</div>

<video
id="video"
controls
autoplay
playsinline>
</video>

</div>

<script>

const playlists = {
BDTV:'https://raw.githubusercontent.com/hasanraf/BDzone/refs/heads/main/BDTv.m3u.txt',
Sports:'https://raw.githubusercontent.com/hasanraf/sports/refs/heads/main/sports.m3u',
Entertainment:'https://raw.githubusercontent.com/hasanraf/entertainment/refs/heads/main/entertainment.m3u',
Movies:'https://raw.githubusercontent.com/hasanraf/Movies/refs/heads/main/movie.m3u',
Music:'https://raw.githubusercontent.com/hasanraf/musicandother/refs/heads/main/musicandother.m3u',
News:'https://raw.githubusercontent.com/hasanraf/News/refs/heads/main/news.m3u',
Kids:'https://raw.githubusercontent.com/hasanraf/Kids/refs/heads/main/kids.m3u'
};

const video = document.getElementById('video');

async function loadPlaylist(category){

    document.getElementById('playerOverlay').classList.add('active');

    const url = playlists[category];

    try{

        const res = await fetch(url);
        const text = await res.text();

        const lines = text.split('\n');

        let channels = [];

        for(let i=0;i<lines.length;i++){

            if(lines[i].includes('#EXTINF')){

                const name = lines[i].split(',').pop().trim();
                const stream = lines[i+1]?.trim();

                if(stream){
                    channels.push({
                        name,
                        stream
                    });
                }
            }
        }

        renderChannels(channels);

        if(channels.length){
            playChannel(channels[0].stream);
        }

    }catch(err){
        alert('Playlist loading failed');
        console.error(err);
    }
}

function renderChannels(channels){

    const box = document.getElementById('channelList');

    box.innerHTML = '<h3>Channels</h3>';

    channels.forEach(ch=>{

        const div = document.createElement('div');

        div.className='channel';

        div.innerText=ch.name;

        div.onclick=()=>{
            playChannel(ch.stream);
        }

        box.appendChild(div);
    });
}

function playChannel(url){

    if(Hls.isSupported()){

        const hls = new Hls();

        hls.loadSource(url);

        hls.attachMedia(video);

    }else{

        video.src=url;
    }

    video.play();

    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
}

function closePlayer(){

    video.pause();

    video.src='';

    document.getElementById('playerOverlay')
    .classList.remove('active');
}

</script>

</body>
</html>
